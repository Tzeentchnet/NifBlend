target-version = "py311"
line-length = 100
extend-exclude = ["nifblend/vendor"]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
    "N",   # pep8-naming
]
ignore = [
    "E501",  # line length handled by formatter
    "B008",  # function calls in argument defaults (Blender operators use this)
]

[lint.per-file-ignores]
"nifblend/__init__.py" = ["F401"]
"**/tests/**" = ["S101"]

[format]
quote-style = "double"
indent-style = "space"
