name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check --config tests/ruff.toml nifblend tools

      - name: Format check (ruff)
        run: ruff format --check --config tests/ruff.toml nifblend tools

      - name: Unit tests
        run: pytest -c tests/pytest.ini -v
