[pytest]
pythonpath = ..
testpaths = ../nifblend/tests ../tools/codegen/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
markers =
    blender: requires running inside Blender (use scripts/run_tests.py)
    golden: requires golden NIF samples in tests/data/
    slow: long-running tests excluded from default runs
